spring.application.name=ApiRest

# 1. Database Connection
spring.datasource.url=jdbc:h2:file:./bbdd/projectdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 2. Hibernate Action
spring.jpa.hibernate.ddl-auto=update

# 3. H2 Console Access Setup (THE FIXED PROPERTIES)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.boot.admin.ui.available=true
spring.security.frame-options=sameorigin