# Configuración de la Base de Datos en Memoria H2
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=USER
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Propiedades de JPA / Hibernate para que cree las tablas automáticamente
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Activar la consola web de H2 para cotillear las tablas
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8085

